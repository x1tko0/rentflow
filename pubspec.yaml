name: rentflow
description: "Менеджер аренды для частных арендодателей"
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Local database
  drift: ^2.23.1
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.28

  # UI
  cupertino_icons: ^1.0.8
  fl_chart: ^0.70.2

  # Utils
  uuid: ^4.5.1
  path_provider: ^2.1.5
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^9.2.4

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

  # PDF
  pdf: ^3.11.2
  printing: ^5.13.2

  # Google Drive backup
  google_sign_in: ^6.2.2
  googleapis: ^13.2.0
  http: ^1.6.0

  # Links & Biometric
  url_launcher: ^6.3.0
  local_auth: ^2.3.0
  purchases_flutter: ^10.2.0
  firebase_core: ^4.9.0
  firebase_crashlytics: ^5.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.5
  drift_dev: ^2.23.1
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  generate: true
  assets:
    - icons/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "icons/1024.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1B2640"
  adaptive_icon_foreground: "icons/1024.png"
